# tmux 配置(COPY 进镜像为 /home/node/.tmux.conf)
# 会话结构变化时自动保存会话列表到 ~/.tmux-session(软链到持久化命名卷)
# 这样 docker 重启 / 重建后,tmux-session restore 就能恢复
set-hook -g after-new-window 'run-shell -b "tmux-session save"'
set-hook -g pane-exited      'run-shell -b "tmux-session save"'
set-hook -g window-renamed   'run-shell -b "tmux-session save"'
